services:
  postgres-test:
    image: postgres:16-alpine
    container_name: travel-test-db
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel_test_pass
      POSTGRES_DB: travel_platform_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d travel_platform_test"]
      interval: 2s
      timeout: 2s
      retries: 15

  api-integration-tests:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.test
    container_name: travel-api-integration-tests
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://travel:travel_test_pass@postgres-test:5432/travel_platform_test?sslmode=disable"
      MIGRATIONS_DIR: /app/migrations
      SEED_FILE: /app/seed/seed.sql
    volumes:
      - ./infra/sql/migrations:/app/migrations:ro
      - ./infra/sql/seeds:/app/seed:ro
